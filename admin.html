<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusat Admin - Smart 169</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-20">

    <nav class="bg-indigo-950 p-6 text-white shadow-xl border-b-4 border-yellow-400 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white text-indigo-950 p-2 rounded-xl font-black italic text-xs">ADMIN</div>
                <h1 class="font-black text-xl uppercase tracking-tighter">SDN 169 PUSAT</h1>
            </div>
            <div class="flex gap-2">
                <a href="kasir_koperasi.html" class="bg-indigo-600 px-4 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-indigo-500 transition-all border border-indigo-400">
                    <i class="fas fa-shopping-cart mr-1"></i> Kasir Koperasi
                </a>
                <a href="kelola_stok.html" class="bg-slate-700 px-4 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-slate-600 transition-all border border-slate-500">
                    <i class="fas fa-boxes mr-1"></i> Stok Barang
                </a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-8 space-y-8">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200">
                <h3 class="text-sm font-black text-indigo-900 mb-6 uppercase italic flex items-center gap-2">
                    <i class="fas fa-bolt text-yellow-500"></i> Quick Top Up Saldo
                </h3>
                <div class="space-y-4">
                    <div class="relative">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Scan Kartu Siswa</label>
                        <input type="text" id="idSiswaTopUp" placeholder="..." 
                            class="w-full mt-1 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black text-lg outline-none focus:border-indigo-500 transition-all">
                        <i class="fas fa-qrcode absolute right-4 top-10 text-slate-300"></i>
                    </div>

                    <div id="infoSiswaTopUp" class="hidden p-4 bg-indigo-50 rounded-[1.5rem] border-2 border-indigo-100 animate-pulse">
                        <p class="text-[10px] font-black text-indigo-300 uppercase">Pemilik Akun:</p>
                        <h4 id="namaSiswaTopUp" class="font-black text-indigo-900 uppercase italic">--</h4>
                        <div class="flex justify-between mt-2 pt-2 border-t border-indigo-200">
                            <span class="text-[10px] font-bold text-indigo-400">SALDO SAAT INI:</span>
                            <span id="saldoSiswaTopUp" class="font-black text-indigo-600 text-sm">Rp 0</span>
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Nominal Top Up</label>
                        <div class="grid grid-cols-2 gap-2 mt-1">
                            <button onclick="setNominal(5000)" class="bg-slate-50 p-2 rounded-xl text-[10px] font-bold hover:bg-yellow-100 border border-slate-100 transition-all">5.000</button>
                            <button onclick="setNominal(10000)" class="bg-slate-50 p-2 rounded-xl text-[10px] font-bold hover:bg-yellow-100 border border-slate-100 transition-all">10.000</button>
                        </div>
                        <input type="number" id="jumlahTopUp" placeholder="Input Manual (Rp)" 
                            class="w-full mt-2 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none focus:border-green-500">
                    </div>
                    <button id="btnProsesTopUp" onclick="prosesTopUp()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all uppercase text-xs">
                        Kirim Saldo Sekarang
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200">
                <h3 class="text-sm font-black text-slate-400 mb-6 uppercase tracking-widest italic">Trend Penjualan Sekolah</h3>
                <canvas id="chartPenjualan" height="130"></canvas>
            </div>
        </div>

        <div class="bg-indigo-900 p-8 rounded-[2.5rem] shadow-2xl border-b-8 border-indigo-700">
            <h3 class="text-sm font-black text-yellow-400 uppercase italic mb-6 flex items-center gap-2">
                <i class="fas fa-history"></i> Riwayat Transaksi Realtime (Kantin & Koperasi)
            </h3>
            <div class="overflow-x-auto custom-scroll max-h-[400px]">
                <table class="w-full text-left border-separate border-spacing-y-2">
                    <thead>
                        <tr class="text-[10px] font-black text-indigo-300 uppercase italic">
                            <th class="px-6 py-2">Waktu</th>
                            <th class="px-6 py-2">Nama Siswa</th>
                            <th class="px-6 py-2">Item Belanja</th>
                            <th class="px-6 py-2">Unit</th>
                            <th class="px-6 py-2 text-right">Total</th>
                        </tr>
                    </thead>
                    <tbody id="tabelRiwayat" class="font-bold text-xs uppercase text-white italic">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <h3 class="text-sm font-black text-indigo-900 uppercase italic">Daftar Anggota Smart 169</h3>
                <input type="text" id="cariSiswa" placeholder="Cari Nama Anggota..." onkeyup="filterTabelSiswa()"
                    class="p-3 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xs font-bold outline-none w-full md:w-64 focus:border-indigo-500">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-separate border-spacing-y-2">
                    <thead>
                        <tr class="text-[10px] font-black text-slate-400 uppercase italic">
                            <th class="px-4">ID</th>
                            <th class="px-4">Nama Lengkap</th>
                            <th class="px-4">Saldo</th>
                            <th class="px-4 text-right">Opsi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelSiswa" class="font-bold text-sm italic uppercase"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUjE8WXa8Py4vnojrXDUR3uCvnQEzP6zQ",
            authDomain: "e-kantin-91f0c.firebaseapp.com",
            databaseURL: "https://e-kantin-91f0c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "e-kantin-91f0c",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. SISTEM TOP UP PERBAIKAN
        function setNominal(n) { document.getElementById('jumlahTopUp').value = n; }

        document.getElementById('idSiswaTopUp').addEventListener('input', function(e) {
            const id = e.target.value.trim();
            if(id.length > 2) {
                db.ref('kantin_users/' + id).once('value', (snap) => {
                    const s = snap.val();
                    if(s) {
                        document.getElementById('infoSiswaTopUp').classList.remove('hidden');
                        document.getElementById('namaSiswaTopUp').innerText = s.nama;
                        document.getElementById('saldoSiswaTopUp').innerText = "Rp " + s.saldo.toLocaleString();
                    } else {
                        document.getElementById('infoSiswaTopUp').classList.add('hidden');
                    }
                });
            }
        });

        async function prosesTopUp() {
            const id = document.getElementById('idSiswaTopUp').value.trim();
            const jumlah = parseInt(document.getElementById('jumlahTopUp').value);
            const btn = document.getElementById('btnProsesTopUp');
            
            if(!id || isNaN(jumlah) || jumlah <= 0) return alert("Data tidak valid!");

            btn.disabled = true; btn.innerText = "PROSES...";

            try {
                const snap = await db.ref('kantin_users/' + id).once('value');
                const user = snap.val();
                if(!user) throw new Error("Siswa tidak ditemukan!");

                const saldoBaru = user.saldo + jumlah;
                await db.ref('kantin_users/' + id + '/saldo').set(saldoBaru);
                
                // Catat di Riwayat sebagai TOP UP
                await db.ref('kantin_laporan').push({
                    idSiswa: id, namaSiswa: user.nama, total: jumlah, 
                    item: "TOP UP SALDO", unit: "Pusat Admin", waktu: new Date().toLocaleString('id-ID')
                });

                alert(`✅ TOP UP BERHASIL!\nSiswa: ${user.nama}\nSaldo Baru: Rp ${saldoBaru.toLocaleString()}`);
                
                document.getElementById('idSiswaTopUp').value = "";
                document.getElementById('jumlahTopUp').value = "";
                document.getElementById('infoSiswaTopUp').classList.add('hidden');
            } catch (e) {
                alert(e.message);
            } finally {
                btn.disabled = false; btn.innerText = "Kirim Saldo Sekarang";
            }
        }

        // 2. RIWAYAT TRANSAKSI REALTIME
        db.ref('kantin_laporan').limitToLast(20).on('value', (snap) => {
            const container = document.getElementById('tabelRiwayat');
            container.innerHTML = "";
            const data = [];
            snap.forEach(child => { data.unshift(child.val()); }); // Data terbaru di atas

            data.forEach(item => {
                const isTopUp = item.item === "TOP UP SALDO";
                container.innerHTML += `
                    <tr class="bg-indigo-800/50 hover:bg-indigo-800 border-l-4 ${isTopUp ? 'border-green-400' : 'border-yellow-400'} transition-all">
                        <td class="px-6 py-4 text-[10px] text-indigo-300 font-bold">${item.waktu}</td>
                        <td class="px-6 py-4">${item.namaSiswa}</td>
                        <td class="px-6 py-4 text-[10px] max-w-xs truncate">${item.item}</td>
                        <td class="px-6 py-4"><span class="bg-indigo-700 px-3 py-1 rounded-full text-[8px]">${item.unit || 'KANTIN'}</span></td>
                        <td class="px-6 py-4 text-right ${isTopUp ? 'text-green-400' : 'text-yellow-400'}">Rp ${item.total.toLocaleString()}</td>
                    </tr>`;
            });
        });

        // 3. TABEL SISWA
        db.ref('kantin_users').on('value', (snap) => {
            const container = document.getElementById('tabelSiswa');
            container.innerHTML = '';
            snap.forEach(child => {
                const s = child.val();
                container.innerHTML += `
                    <tr class="bg-slate-50 hover:bg-indigo-50 transition-all border-b border-white">
                        <td class="p-4 rounded-l-2xl text-indigo-400 font-black">${child.key}</td>
                        <td class="p-4 text-slate-800">${s.nama}</td>
                        <td class="p-4 text-green-600 font-black italic">Rp ${s.saldo.toLocaleString()}</td>
                        <td class="p-4 rounded-r-2xl text-right">
                             <button onclick="hapusSiswa('${child.key}')" class="text-slate-200 hover:text-red-500 transition-colors">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>`;
            });
        });

        // 4. CHART (Simulasi data)
        const ctx = document.getElementById('chartPenjualan').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'],
                datasets: [{
                    label: 'Omzet Gabungan',
                    data: [450000, 590000, 320000, 810000, 560000, 950000],
                    borderColor: '#4f46e5', tension: 0.4, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.05)'
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });

        function filterTabelSiswa() {
            let input = document.getElementById("cariSiswa").value.toUpperCase();
            let tr = document.getElementById("tabelSiswa").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[1];
                if (td && (td.textContent || td.innerText).toUpperCase().indexOf(input) > -1) {
                    tr[i].style.display = "";
                } else { tr[i].style.display = "none"; }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusat Admin - Smart 169</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10">

    <nav class="bg-indigo-950 p-6 text-white shadow-xl border-b-4 border-yellow-400">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white text-indigo-950 p-2 rounded-xl font-black italic">ADMIN</div>
                <h1 class="font-black text-xl uppercase tracking-tighter">Panel Pusat SDN 169</h1>
            </div>
            <div class="flex gap-3">
                <a href="index.html" class="bg-indigo-600 px-4 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-indigo-500 transition-all border border-indigo-400">
                    <i class="fas fa-cash-register mr-1"></i> Kasir
                </a>
                <a href="kelola_stok.html" class="bg-slate-700 px-4 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-slate-600 transition-all border border-slate-500">
                    <i class="fas fa-boxes mr-1"></i> Stok
                </a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-8 space-y-8">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200">
                <h3 class="text-sm font-black text-indigo-900 mb-6 uppercase italic flex items-center gap-2">
                    <i class="fas fa-wallet text-yellow-500"></i> Top Up Saldo Siswa
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">ID Siswa (Scan)</label>
                        <input type="text" id="idSiswaTopUp" placeholder="Scan Barcode Siswa" 
                            class="w-full mt-1 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none focus:border-indigo-500">
                    </div>
                    <div id="infoSiswaTopUp" class="hidden p-3 bg-indigo-50 rounded-xl border border-indigo-100 text-xs font-bold text-indigo-800">
                        Nama: <span id="namaSiswaTopUp">-</span><br>
                        Saldo: Rp <span id="saldoSiswaTopUp">0</span>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Jumlah Top Up (Rp)</label>
                        <input type="number" id="jumlahTopUp" placeholder="0" 
                            class="w-full mt-1 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none focus:border-indigo-500">
                    </div>
                    <button onclick="prosesTopUp()" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-green-700 active:scale-95 transition-all uppercase text-xs">
                        Proses Top Up
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200">
                <h3 class="text-sm font-black text-slate-400 mb-6 uppercase tracking-widest italic">Performa Penjualan Koperasi</h3>
                <canvas id="chartPenjualan" height="120"></canvas>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <h3 class="text-sm font-black text-indigo-900 uppercase italic">Database Saldo Anggota</h3>
                <input type="text" id="cariSiswa" placeholder="Cari Nama Siswa..." onkeyup="filterTabelSiswa()"
                    class="p-3 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xs font-bold outline-none w-full md:w-64 focus:border-indigo-500">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-separate border-spacing-y-2">
                    <thead>
                        <tr class="text-[10px] font-black text-slate-400 uppercase">
                            <th class="px-4">ID Siswa</th>
                            <th class="px-4">Nama Lengkap</th>
                            <th class="px-4">Saldo Aktif</th>
                            <th class="px-4 text-right">Opsi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelSiswa" class="font-bold text-sm italic uppercase">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCUjE8WXa8Py4vnojrXDUR3uCvnQEzP6zQ",
            authDomain: "e-kantin-91f0c.firebaseapp.com",
            databaseURL: "https://e-kantin-91f0c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "e-kantin-91f0c",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. CEK SISWA UNTUK TOP UP
        document.getElementById('idSiswaTopUp').addEventListener('change', function(e) {
            const id = e.target.value.trim();
            db.ref('kantin_users/' + id).once('value', (snap) => {
                const s = snap.val();
                if(s) {
                    document.getElementById('infoSiswaTopUp').classList.remove('hidden');
                    document.getElementById('namaSiswaTopUp').innerText = s.nama;
                    document.getElementById('saldoSiswaTopUp').innerText = s.saldo.toLocaleString();
                } else {
                    alert("ID tidak ditemukan!");
                    e.target.value = "";
                }
            });
        });

        // 2. PROSES TOP UP
        function prosesTopUp() {
            const id = document.getElementById('idSiswaTopUp').value.trim();
            const jumlah = parseInt(document.getElementById('jumlahTopUp').value);
            
            if(!id || isNaN(jumlah)) return alert("Lengkapi data!");

            db.ref('kantin_users/' + id).once('value', (snap) => {
                const currentSaldo = snap.val().saldo;
                db.ref('kantin_users/' + id + '/saldo').set(currentSaldo + jumlah).then(() => {
                    alert("Top Up Berhasil!");
                    document.getElementById('idSiswaTopUp').value = "";
                    document.getElementById('jumlahTopUp').value = "";
                    document.getElementById('infoSiswaTopUp').classList.add('hidden');
                });
            });
        }

        // 3. TAMPILKAN TABEL SISWA (REALTIME)
        db.ref('kantin_users').on('value', (snap) => {
            const data = snap.val();
            const tabel = document.getElementById('tabelSiswa');
            tabel.innerHTML = '';
            for(let key in data) {
                const s = data[key];
                tabel.innerHTML += `
                    <tr class="bg-slate-50 hover:bg-indigo-50 transition-all">
                        <td class="p-4 rounded-l-2xl text-indigo-400 font-black">${key}</td>
                        <td class="p-4 text-slate-800">${s.nama}</td>
                        <td class="p-4 text-green-600">Rp ${s.saldo.toLocaleString()}</td>
                        <td class="p-4 rounded-r-2xl text-right">
                            <button onclick="hapusSiswa('${key}')" class="text-red-300 hover:text-red-500 transition-colors">
                                <i class="fas fa-user-minus"></i>
                            </button>
                        </td>
                    </tr>`;
            }
        });

        // 4. GRAFIK SEDERHANA
        const ctx = document.getElementById('chartPenjualan').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'],
                datasets: [{
                    label: 'Omzet Koperasi (IDR)',
                    data: [120000, 190000, 30000, 50000, 200000, 300000],
                    backgroundColor: '#4f46e5',
                    borderRadius: 10
                }]
            },
            options: { scales: { y: { beginAtZero: true } } }
        });

        function filterTabelSiswa() {
            let input = document.getElementById("cariSiswa").value.toUpperCase();
            let tr = document.getElementById("tabelSiswa").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[1];
                if (td) {
                    let txtValue = td.textContent || td.innerText;
                    tr[i].style.display = txtValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        }
    </script>
</body>
</html>

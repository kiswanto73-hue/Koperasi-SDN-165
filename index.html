<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASIR KOPERASI - SDN 169</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10">
    <div class="max-w-6xl mx-auto p-4">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div class="bg-indigo-950 p-6 rounded-[2rem] text-white shadow-xl flex-1 w-full border-b-4 border-yellow-400 flex items-center justify-between">
                <div>
                    <h1 class="text-xl font-black italic uppercase text-yellow-400">KASIR KOPERASI 📚</h1>
                    <p class="text-[9px] font-bold opacity-60 uppercase tracking-widest italic">SDN 169 SMART SYSTEM</p>
                </div>
                <div class="hidden md:block text-right">
                    <p id="jam" class="font-black text-sm">00:00:00</p>
                    <p class="text-[8px] opacity-50 uppercase font-bold">Waktu Server Aktif</p>
                </div>
            </div>
            <button onclick="window.location.href='index.html'" class="bg-white px-8 py-6 rounded-[2rem] shadow font-black text-indigo-900 text-xs border-2 border-slate-100 hover:bg-slate-50 transition-all active:scale-90">PORTAL</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-8">
                <div class="bg-white p-4 rounded-3xl shadow-sm mb-6 flex items-center border border-slate-200">
                    <div class="bg-indigo-50 p-3 rounded-2xl mr-4 text-indigo-600">
                        <i class="fas fa-search"></i>
                    </div>
                    <input type="text" id="inputCari" onkeyup="filterBarang()" placeholder="Cari nama barang di koperasi..." 
                        class="w-full bg-transparent border-none outline-none font-bold text-slate-700 placeholder:text-slate-300 italic uppercase text-sm">
                </div>

                <div id="containerBarang" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4">
                    </div>
            </div>

            <div class="lg:col-span-4">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl sticky top-4 border-t-8 border-indigo-600">
                    <h2 class="text-center font-black text-slate-400 text-[10px] mb-4 uppercase tracking-[0.2em]">Keranjang Belanja</h2>
                    
                    <div id="cartItems" class="space-y-2 mb-4 max-h-[250px] overflow-y-auto italic border-b border-dashed pb-4 text-xs font-bold text-slate-600 hide-scrollbar">
                        </div>
                    
                    <div class="py-4 mb-4 text-center bg-slate-50 rounded-3xl">
                        <span class="text-[10px] font-black text-slate-400 uppercase block mb-1">Total Pembayaran</span>
                        <span id="totalHarga" class="text-3xl font-black text-indigo-600">Rp 0</span>
                    </div>

                    <div id="scannerArea" class="hidden mb-4">
                        <div id="reader" class="rounded-2xl overflow-hidden border-4 border-indigo-50 shadow-inner"></div>
                    </div>

                    <button id="btnCheckout" onclick="bukaScanner()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-lg uppercase text-xs tracking-widest transition-all mb-3 flex items-center justify-center gap-2">
                        <i class="fas fa-qrcode text-lg"></i> SCAN & BAYAR
                    </button>
                    
                    <button onclick="resetCart()" class="w-full text-slate-300 hover:text-red-400 font-bold text-[9px] uppercase transition-colors">Batal / Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCUjE8WXa8Py4vnojrXDUR3uCvnQEzP6zQ",
            authDomain: "e-kantin-91f0c.firebaseapp.com",
            databaseURL: "https://e-kantin-91f0c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "e-kantin-91f0c",
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cart = [];
        let total = 0;
        const FONNTE_TOKEN = "eRiRwGfU96GqAyaMXM7Q"; 

        // 1. LOAD DATA BARANG
        function loadStok() {
            db.ref('koperasi/stok').on('value', snap => {
                const container = document.getElementById('containerBarang');
                container.innerHTML = "";
                const data = snap.val();

                for (let nama in data) {
                    const item = data[nama];
                    const isHabis = item.stok <= 0;
                    
                    container.innerHTML += `
                        <button data-nama="${nama}" onclick="${isHabis ? "alert('Stok Habis!')" : `addToCart('${nama}', ${item.harga})`}" 
                            class="item-card ${isHabis ? 'opacity-40 grayscale cursor-not-allowed bg-slate-200' : 'bg-white hover:bg-indigo-50 hover:border-indigo-200'} p-5 rounded-[2rem] shadow-sm border-2 border-transparent transition-all active:scale-95 text-center flex flex-col justify-between h-full min-h-[140px]">
                            <div>
                                <p class="text-[10px] font-black uppercase text-slate-800 leading-tight mb-1">${nama}</p>
                                <p class="text-xs font-bold text-indigo-600">Rp ${item.harga.toLocaleString()}</p>
                            </div>
                            <div class="mt-3">
                                <span class="text-[8px] px-3 py-1 rounded-full font-black ${item.stok < 5 ? 'bg-red-100 text-red-600' : 'bg-slate-100 text-slate-400'}">
                                    ${isHabis ? 'HABIS' : 'STOK: ' + item.stok}
                                </span>
                            </div>
                        </button>`;
                }
            });
        }

        // 2. FITUR PENCARIAN (FILTER)
        function filterBarang() {
            const input = document.getElementById('inputCari').value.toUpperCase();
            const cards = document.getElementsByClassName('item-card');

            for (let i = 0; i < cards.length; i++) {
                const namaBarang = cards[i].getAttribute('data-nama');
                if (namaBarang.indexOf(input) > -1) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        // 3. KERANJANG & BAYAR
        function addToCart(nama, harga) {
            cart.push({ nama, harga });
            updateCartDisplay();
        }

        function updateCartDisplay() {
            const cont = document.getElementById('cartItems');
            cont.innerHTML = "";
            total = 0;
            cart.forEach((item, index) => {
                total += item.harga;
                cont.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-2 px-4 rounded-2xl border border-slate-100 animate-in slide-in-from-right">
                        <span class="uppercase font-bold text-[9px] truncate w-2/3">${item.nama}</span>
                        <button onclick="removeItem(${index})" class="text-red-400 font-black px-2 hover:text-red-600">×</button>
                    </div>`;
            });
            document.getElementById('totalHarga').innerText = "Rp " + total.toLocaleString();
        }

        function removeItem(idx) { cart.splice(idx, 1); updateCartDisplay(); }
        function resetCart() { cart = []; updateCartDisplay(); }

        async function prosesBayar(idSiswa) {
            if(cart.length === 0) return;
            const btn = document.getElementById('btnCheckout');
            if (btn.disabled) return;

            btn.innerText = "PROSES...";
            btn.disabled = true;

            const trimmedId = idSiswa.trim();

            try {
                const userSnap = await db.ref('kantin_users/' + trimmedId).once('value');
                const user = userSnap.val();

                if(!user) throw new Error("KARTU TIDAK TERDAFTAR!");
                if(user.saldo < total) throw new Error("SALDO TIDAK CUKUP!");

                const saldoBaru = user.saldo - total;
                await db.ref('kantin_users/' + trimmedId + '/saldo').set(saldoBaru);

                let detailWA = "";
                for (let item of cart) {
                    detailWA += `\n- ${item.nama} (Rp ${item.harga.toLocaleString()})`;
                    await db.ref('koperasi/stok/' + item.nama + '/stok').transaction(s => (s || 1) - 1);
                }

                const waktu = new Date().toLocaleString('id-ID');
                await db.ref('kantin_laporan').push({
                    idSiswa: trimmedId, namaSiswa: user.nama, total: total,
                    item: cart.map(i => i.nama).join(", "), unit: "KOPERASI", waktu: waktu
                });

                if (user.wa) {
                    const pesanWA = `*STRUK KOPERASI 169*\n\nNama: *${user.nama}*\nBelanja:${detailWA}\n--------------------------\n*Total: Rp ${total.toLocaleString()}*\nSisa Saldo: *Rp ${saldoBaru.toLocaleString()}*\n\n_Semangat Belajar di SDN 169_`;
                    const fd = new FormData();
                    fd.append('target', user.wa);
                    fd.append('message', pesanWA);
                    fetch('https://api.fonnte.com/send', { method:'POST', headers:{'Authorization':FONNTE_TOKEN}, body:fd });
                }

                alert(`✅ BERHASIL!\n${user.nama}\nSaldo Sisa: Rp ${saldoBaru.toLocaleString()}`);
                resetCart();

            } catch (err) {
                alert("❌ ERROR: " + err.message);
            } finally {
                btn.innerHTML = `<i class="fas fa-qrcode text-lg"></i> SCAN & BAYAR`;
                btn.disabled = false;
            }
        }

        // 4. SCANNER BLUETOOTH & JAM
        let barcodeBuffer = "";
        let lastKeyTime = Date.now();
        window.addEventListener("keydown", (e) => {
            const currentTime = Date.now();
            if (currentTime - lastKeyTime > 50) barcodeBuffer = "";
            if (e.key === "Enter") {
                if (barcodeBuffer.length > 2) {
                    e.preventDefault();
                    prosesBayar(barcodeBuffer);
                    barcodeBuffer = "";
                }
            } else if (e.key.length === 1) {
                barcodeBuffer += e.key;
            }
            lastKeyTime = currentTime;
        });

        setInterval(() => {
            document.getElementById('jam').innerText = new Date().toLocaleTimeString('id-ID');
        }, 1000);

        function bukaScanner() {
            if(cart.length === 0) return alert("Pilih barang dulu!");
            document.getElementById('scannerArea').classList.remove('hidden');
            const sc = new Html5Qrcode("reader");
            sc.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (id) => {
                sc.stop().then(() => {
                    document.getElementById('scannerArea').classList.add('hidden');
                    prosesBayar(id);
                });
            });
        }

        loadStok();
    </script>
</body>
</html>

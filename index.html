<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koperasi ATK 169</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen">

    <nav class="bg-indigo-700 p-6 shadow-xl text-white sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black uppercase tracking-tighter"><i class="fas fa-pen-nib mr-2 text-yellow-400"></i> ATK KOPERASI 169</h1>
            <div class="bg-indigo-800 px-4 py-2 rounded-2xl border border-indigo-400">
                <p class="text-[10px] opacity-70 uppercase font-bold">Total Omzet</p>
                <p class="text-lg font-black text-yellow-400">Rp <span id="totalOmzet">0</span></p>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-indigo-100">
                <h3 class="font-bold mb-4 text-indigo-900"><i class="fas fa-boxes mr-2"></i> Tambah/Update Stok</h3>
                <div class="space-y-3">
                    <input type="text" id="namaBarang" placeholder="Nama ATK (Contoh: Buku Sidu)" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="hargaBarang" placeholder="Harga Jual" class="p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                        <input type="number" id="stokBarang" placeholder="Jumlah Stok" class="p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <button onclick="updateStok()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition">Update Inventaris</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-indigo-100 h-[400px] overflow-y-auto">
                <h3 class="font-bold mb-4 sticky top-0 bg-white">Sisa Stok Barang</h3>
                <div id="listStok" class="space-y-2">
                    </div>
            </div>
        </div>

        <div class="lg:col-span-8 bg-white p-6 rounded-[3rem] shadow-xl border border-indigo-100">
            <h3 class="font-bold text-xl mb-6 text-slate-800"><i class="fas fa-shopping-cart mr-2 text-indigo-500"></i> Kasir ATK</h3>
            
            <div id="quickAction" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
                </div>

            <hr class="mb-6">

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] text-gray-400 uppercase tracking-widest border-b">
                            <th class="pb-4">Nama Barang</th>
                            <th class="pb-4">Harga</th>
                            <th class="pb-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelPenjualan" class="text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBc4-0es7edfyw9-V1GdIGJnYxeEW70omc",
          authDomain: "aplikasi-bintang.firebaseapp.com",
          databaseURL: "https://aplikasi-bintang-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "aplikasi-bintang",
          storageBucket: "aplikasi-bintang.firebasestorage.app",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. UPDATE STOK BARANG
        function updateStok() {
            const nama = document.getElementById('namaBarang').value;
            const harga = document.getElementById('hargaBarang').value;
            const stok = document.getElementById('stokBarang').value;
            if(!nama || !harga || !stok) return alert("Lengkapi data barang!");

            db.ref('koperasi/atk/' + nama).set({
                harga: parseInt(harga),
                stok: parseInt(stok)
            });
            alert("Stok " + nama + " diperbarui!");
        }

        // 2. LOAD DATA STOK & TOMBOL KASIR
        db.ref('koperasi/atk').on('value', (snap) => {
            const data = snap.val();
            const listStok = document.getElementById('listStok');
            const quickAction = document.getElementById('quickAction');
            listStok.innerHTML = '';
            quickAction.innerHTML = '';

            for(let key in data) {
                // Tampilan Daftar Stok
                listStok.innerHTML += `
                    <div class="flex justify-between p-3 bg-slate-50 rounded-xl text-xs border">
                        <span class="font-bold">${key}</span>
                        <span class="bg-indigo-100 text-indigo-700 px-2 rounded-full font-black">${data[key].stok}</span>
                    </div>
                `;
                // Tombol Kasir Cepat
                quickAction.innerHTML += `
                    <button onclick="jualBarang('${key}', ${data[key].harga}, ${data[key].stok})" 
                        class="p-4 bg-indigo-50 border-2 border-indigo-100 rounded-2xl hover:bg-yellow-400 hover:border-yellow-500 transition group">
                        <p class="text-[10px] font-bold text-indigo-400 group-hover:text-yellow-900 uppercase">${key}</p>
                        <p class="font-black text-indigo-900">Rp ${data[key].harga.toLocaleString()}</p>
                    </button>
                `;
            }
        });

        // 3. PROSES JUAL BARANG
        function jualBarang(nama, harga, stokLama) {
            if(stokLama <= 0) return alert("Maaf Pak, Stok " + nama + " Habis!");

            // Kurangi Stok di Database
            db.ref('koperasi/atk/' + nama).update({ stok: stokLama - 1 });

            // Catat di Penjualan
            db.ref('koperasi/penjualan_harian').push({
                item: nama,
                harga: harga,
                waktu: new Date().toLocaleTimeString('id-ID')
            });
        }

        // 4. TAMPILKAN PENJUALAN HARI INI
        db.ref('koperasi/penjualan_harian').on('value', (snap) => {
            const data = snap.val();
            const tabel = document.getElementById('tabelPenjualan');
            let total = 0;
            tabel.innerHTML = '';

            if(!data) return;

            const items = Object.keys(data).map(k => ({id: k, ...data[k]})).reverse();
            items.forEach(p => {
                total += p.harga;
                tabel.innerHTML += `
                    <tr class="border-b">
                        <td class="py-4 font-bold text-slate-700">${p.item} <br> <span class="text-[9px] text-gray-400">${p.waktu}</span></td>
                        <td class="py-4 font-black text-indigo-600">Rp ${p.harga.toLocaleString()}</td>
                        <td class="py-4 text-center">
                            <button onclick="batalJual('${p.id}', '${p.item}')" class="text-red-300 hover:text-red-500"><i class="fas fa-times-circle"></i></button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('totalOmzet').innerText = total.toLocaleString();
        });

        function batalJual(id, nama) {
            if(confirm("Batalkan transaksi ini?")) {
                db.ref('koperasi/penjualan_harian/' + id).remove();
                // Catatan: Di sini Bapak bisa tambahkan logika untuk mengembalikan stok jika perlu
            }
        }
    </script>
</body>
</html>

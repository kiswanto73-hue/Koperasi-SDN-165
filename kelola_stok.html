<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Stok - Koperasi 169</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="bg-indigo-950 text-white p-8 rounded-[2.5rem] shadow-2xl mb-8 flex flex-col md:flex-row justify-between items-center gap-4 border-b-4 border-yellow-400">
            <div class="flex items-center gap-4">
                <div class="bg-yellow-400 text-indigo-950 p-3 rounded-2xl font-black text-2xl italic shadow-lg">169</div>
                <div>
                    <h1 class="text-2xl font-black italic tracking-tighter uppercase leading-none">Gudang Koperasi</h1>
                    <p class="text-[10px] opacity-60 uppercase tracking-[0.2em] mt-1 font-bold text-yellow-400">Update Stok & Inventaris</p>
                </div>
            </div>
            <a href="index.html" class="bg-white/10 px-6 py-3 rounded-2xl text-xs font-black uppercase hover:bg-yellow-400 hover:text-indigo-950 transition-all border border-white/20 flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Kembali ke Kasir
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 sticky top-8">
                    <h3 class="text-sm font-black text-indigo-900 mb-6 uppercase italic flex items-center gap-2">
                        <i class="fas fa-edit text-yellow-500"></i> Form Data Barang
                    </h3>
                    <div class="space-y-5">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 ml-2 uppercase tracking-widest">Nama Barang</label>
                            <input type="text" id="namaBarang" placeholder="MISAL: BUKU TULIS" 
                                class="w-full mt-1 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 transition-all uppercase">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 ml-2 uppercase tracking-widest">Harga Jual (Rp)</label>
                            <input type="number" id="hargaBarang" placeholder="0" 
                                class="w-full mt-1 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none focus:border-indigo-500 transition-all">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 ml-2 uppercase tracking-widest">Jumlah Stok</label>
                            <input type="number" id="stokBarang" placeholder="0" 
                                class="w-full mt-1 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none focus:border-indigo-500 transition-all">
                        </div>
                        <button onclick="simpanBarang()" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-lg shadow-indigo-100 uppercase text-xs tracking-widest hover:bg-indigo-700 active:scale-95 transition-all flex justify-center items-center gap-2">
                            <i class="fas fa-save"></i> Simpan Barang
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest italic">Daftar Inventaris Aktif</h3>
                        <span class="bg-indigo-50 text-indigo-600 text-[10px] font-black px-4 py-1 rounded-full uppercase italic border border-indigo-100">Realtime Database</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-separate border-spacing-y-3">
                            <thead>
                                <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                    <th class="px-4 py-2">Nama Produk</th>
                                    <th class="px-4 py-2 text-center">Harga</th>
                                    <th class="px-4 py-2 text-center">Stok</th>
                                    <th class="px-4 py-2 text-right">Opsi</th>
                                </tr>
                            </thead>
                            <tbody id="tabelStok" class="font-bold uppercase italic text-sm">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCUjE8WXa8Py4vnojrXDUR3uCvnQEzP6zQ",
            authDomain: "e-kantin-91f0c.firebaseapp.com",
            databaseURL: "https://e-kantin-91f0c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "e-kantin-91f0c",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. SIMPAN BARANG
        function simpanBarang() {
            const nama = document.getElementById('namaBarang').value.toUpperCase().trim();
            const harga = parseInt(document.getElementById('hargaBarang').value);
            const stok = parseInt(document.getElementById('stokBarang').value);

            if(!nama || isNaN(harga) || isNaN(stok)) {
                alert("Harap lengkapi semua data barang!");
                return;
            }

            db.ref('koperasi/stok/' + nama).set({
                harga: harga,
                stok: stok
            }).then(() => {
                alert("Barang '" + nama + "' berhasil disimpan!");
                document.getElementById('namaBarang').value = "";
                document.getElementById('hargaBarang').value = "";
                document.getElementById('stokBarang').value = "";
            });
        }

        // 2. TAMPILKAN STOK (REALTIME)
        db.ref('koperasi/stok').on('value', (snap) => {
            const data = snap.val();
            const tabel = document.getElementById('tabelStok');
            tabel.innerHTML = '';

            if(!data) {
                tabel.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-slate-300">Belum ada data barang...</td></tr>';
                return;
            }

            for(let key in data) {
                const item = data[key];
                const stokWarna = item.stok < 5 ? 'bg-red-50 text-red-600 border-red-100' : 'bg-green-50 text-green-600 border-green-100';
                
                tabel.innerHTML += `
                    <tr class="bg-slate-50/50 hover:bg-indigo-50 transition-all group">
                        <td class="p-4 rounded-l-2xl border-y border-l border-slate-100">
                            <span class="text-indigo-950 font-black">${key}</span>
                        </td>
                        <td class="p-4 border-y border-slate-100 text-center text-indigo-600">
                            Rp ${item.harga.toLocaleString()}
                        </td>
                        <td class="p-4 border-y border-slate-100 text-center">
                            <span class="px-4 py-1 rounded-lg border font-black text-xs ${stokWarna}">
                                ${item.stok}
                            </span>
                        </td>
                        <td class="p-4 rounded-r-2xl border-y border-r border-slate-100 text-right">
                            <button onclick="editBarang('${key}', ${item.harga}, ${item.stok})" class="text-indigo-400 hover:text-indigo-700 p-2 transition-colors">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="hapusBarang('${key}')" class="text-red-300 hover:text-red-600 p-2 transition-colors">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>`;
            }
        });

        // 3. FUNGSI EDIT & HAPUS
        function editBarang(nama, harga, stok) {
            document.getElementById('namaBarang').value = nama;
            document.getElementById('hargaBarang').value = harga;
            document.getElementById('stokBarang').value = stok;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function hapusBarang(nama) {
            if(confirm("Apakah Anda yakin ingin menghapus '" + nama + "' dari inventaris?")) {
                db.ref('koperasi/stok/' + nama).remove();
            }
        }
    </script>
</body>
</html>

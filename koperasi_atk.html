<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koperasi ATK - Unit Bendahara SDN 169</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen">

    <nav class="bg-indigo-800 p-6 shadow-xl text-white sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-tighter">KOPERASI ATK</h1>
                <p class="text-[10px] opacity-70 uppercase">Unit Usaha Bendahara SDN 169</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] opacity-70">Omzet Penjualan</p>
                <p class="text-xl font-black text-yellow-400">Rp <span id="totalOmzet">0</span></p>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-indigo-100">
                <h3 class="font-bold mb-4 text-indigo-900">Kelola Inventaris</h3>
                <div class="space-y-3">
                    <input type="text" id="namaBarang" placeholder="Nama Barang" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="hargaBarang" placeholder="Harga" class="p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                        <input type="number" id="stokBarang" placeholder="Stok" class="p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <button onclick="updateStok()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition shadow-lg">Simpan Barang</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-indigo-100">
                <h3 class="font-bold mb-4 text-sm uppercase opacity-50">Sisa Stok</h3>
                <div id="listStok" class="space-y-2"></div>
            </div>
        </div>

        <div class="lg:col-span-8 bg-white p-6 rounded-[2.5rem] shadow-xl border border-indigo-100">
            <h3 class="font-bold text-lg mb-6"><i class="fas fa-cash-register mr-2 text-indigo-500"></i> Kasir Penjualan</h3>
            
            <div id="quickAction" class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-8"></div>

            <h4 class="font-bold text-xs uppercase opacity-40 mb-3 tracking-widest">Transaksi Hari Ini</h4>
            <div id="tabelPenjualan" class="space-y-3"></div>
        </div>
    </div>

    <script>
        // KOPAS CONFIG DARI APLIKASI BENDAHARA BAPAK KE SINI
        const firebaseConfig = {
          apiKey: "AIzaSyBc4-0es7edfyw9-V1GdIGJnYxeEW70omc",
          authDomain: "aplikasi-bintang.firebaseapp.com",
          databaseURL: "https://aplikasi-bintang-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "aplikasi-bintang",
          storageBucket: "aplikasi-bintang.firebasestorage.app",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. UPDATE STOK (Masuk ke folder 'koperasi/stok')
        function updateStok() {
            const nama = document.getElementById('namaBarang').value;
            const harga = document.getElementById('hargaBarang').value;
            const stok = document.getElementById('stokBarang').value;
            if(!nama || !harga || !stok) return alert("Isi data dengan lengkap!");

            db.ref('koperasi/stok/' + nama).set({
                harga: parseInt(harga),
                stok: parseInt(stok)
            });
            document.getElementById('namaBarang').value = '';
            document.getElementById('hargaBarang').value = '';
            document.getElementById('stokBarang').value = '';
        }

        // 2. MONITOR STOK & BUTTONS
        db.ref('koperasi/stok').on('value', (snap) => {
            const data = snap.val();
            const listStok = document.getElementById('listStok');
            const quickAction = document.getElementById('quickAction');
            listStok.innerHTML = ''; quickAction.innerHTML = '';
            if(!data) return;

            for(let key in data) {
                listStok.innerHTML += `
                    <div class="flex justify-between p-3 bg-indigo-50 rounded-xl text-xs">
                        <span>${key}</span>
                        <span class="font-bold text-indigo-700">${data[key].stok} pcs</span>
                    </div>`;
                
                quickAction.innerHTML += `
                    <button onclick="jual('${key}', ${data[key].harga}, ${data[key].stok})" 
                        class="p-4 bg-white border-2 border-slate-100 rounded-2xl hover:border-indigo-500 hover:shadow-md text-left transition">
                        <p class="text-[10px] text-gray-400 uppercase font-bold">${key}</p>
                        <p class="font-black text-indigo-900">Rp ${data[key].harga.toLocaleString()}</p>
                    </button>`;
            }
        });

        // 3. PROSES JUAL
        function jual(nama, harga, stokLama) {
            if(stokLama <= 0) return alert("Stok Habis!");
            
            // Kurangi stok
            db.ref('koperasi/stok/' + nama).update({ stok: stokLama - 1 });

            // Catat penjualan (folder 'koperasi/penjualan')
            db.ref('koperasi/penjualan').push({
                item: nama,
                harga: harga,
                waktu: new Date().toLocaleTimeString('id-ID')
            });
        }

        // 4. RIWAYAT PENJUALAN
        db.ref('koperasi/penjualan').on('value', (snap) => {
            const data = snap.val();
            const list = document.getElementById('tabelPenjualan');
            let total = 0;
            list.innerHTML = '';
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const p = data[id];
                total += p.harga;
                list.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <div class="text-sm font-bold text-slate-700">${p.item} <span class="block text-[9px] font-normal text-gray-400">${p.waktu}</span></div>
                        <div class="font-black text-indigo-600">Rp ${p.harga.toLocaleString()}</div>
                    </div>`;
            });
            document.getElementById('totalOmzet').innerText = total.toLocaleString();
        });
    </script>
</body>
</html>
